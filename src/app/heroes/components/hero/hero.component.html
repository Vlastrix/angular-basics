
<h1>{{ name }}</h1>

<dl>
  <td>Nombre:</td>
  <dd>{{ name }}</dd>

  <td>Edad:</td>
  <dd>{{ age }}</dd>

  <td>Método:</td>
  <dd>{{ getHeroDescription() }}</dd>

  <td>Capitalizado:</td>
  <dd>{{ capitalizedName }}</dd>
</dl>

<button *ngIf="name !== 'spider-man'" class="btn btn-primary mx-2" (click)="changeHero()">Cambiar Nombre</button>

<button *ngIf="age !== 64" class="btn btn-primary" (click)="changeAge()">Cambiar Edad</button>

<button *ngIf="name === 'spider-man' || age === 64" class="btn btn-primary" (click)="resetForm()">Resetear</button>
